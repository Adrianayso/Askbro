<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AskBro | Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles/auth.css">
</head>

<body>

<div class="auth-box">

<h1>Login to <span>AskBro</span></h1>

<button id="googleLogin" class="google-btn">
  <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
  Continue with Google
</button>

</div>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyBzmCtbUAYH4VhbLj-Shh4SaVkS08KehhA",
authDomain: "askbro-f579f.firebaseapp.com",
projectId: "askbro-f579f",
storageBucket: "askbro-f579f.firebasestorage.app",
messagingSenderId: "472432054781",
appId: "1:472432054781:web:d0a5f6bc1f09ee1e344994",
measurementId: "G-41HEEHVLGF"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").addEventListener("click", loginWithGoogle);

function loginWithGoogle(){

signInWithPopup(auth, provider)
.then((result)=>{

const user = result.user;

localStorage.setItem("askbro_loggedin","true");
localStorage.setItem("askbro_username", user.displayName);

window.location.href="user-chat.html";

})
.catch((error)=>{

alert(error.message);

});

}

</script>

</body>
</html>
