<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AskBro - User Agreement</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles/consent.css">
</head>
<body>
  
<div class="consent-box">
  <h1>Welcome to <span>AskBro</span></h1>

  <p>
    AskBro is an AI-powered chatbot created for educational purposes.
    Before using this website, please read and agree to our
    <a href="terms.html">Terms & Conditions</a>,
    <a href="privacy.html">Privacy Policy</a>, and
    <a href="dataprivacy.html">Data Privacy Notice</a>.
  </p>

  <label class="checkbox">
    <input type="checkbox" id="agree">
    I have read and agree to the Terms & Privacy Policy
  </label>

  <button onclick="acceptTerms()">Continue</button>
</div>

<script>
  function acceptTerms() {
    const agree = document.getElementById("agree");

    if (!agree.checked) {
      alert("You must agree before continuing.");
      return;
    }

    localStorage.setItem("askbro_agreed", "true");
    window.location.href = "guest-chat.html"; // or login.html
  }
</script>

</body>
</html>
